<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MooLah | 極簡預約系統</title>
    <style>
        /* 極簡高端美學 CSS */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; padding: 0; }
        
        /* 圖片區塊樣式 */
        #shopImage { width: 100%; height: 250px; object-fit: cover; display: none; /* 預設隱藏，抓到資料才顯示 */ }
        
        .content { padding: 25px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #1a1a1a; }
        p { color: #666; line-height: 1.6; font-size: 0.95rem; }
        .btn { background-color: #FF8C00; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <img id="shopImage" src="" alt="店家首圖">
        
        <div class="content">
            <h1 id="shopName">載入中...</h1>
            <p id="shopIntro">正在為您準備預約頁面...</p>
            
            <button class="btn" onclick="alert('預約功能開發中！')">立即預約</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/0kwgaenxrzmgt';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || '1'; // 預設 ID 為 1

            try {
                const response = await fetch(`${API_URL}?sheet=Shops`);
                const data = await response.json();
                const shop = data.find(item => item.ID === id);

                if (shop) {
                    // 1. 更新名稱與介紹
                    document.getElementById('shopName').innerText = shop.店名;
                    document.getElementById('shopIntro').innerText = shop.設計師介紹;

                    // 2. 更新圖片 (這就是你找不到的那一行！)
                    if (shop.店家圖片) {
                        const img = document.getElementById('shopImage');
                        img.src = shop.店家圖片;
                        img.style.display = 'block'; // 抓到圖片後才顯示
                    }
                } else {
                    document.getElementById('shopName').innerText = "找不到店家";
                }
            } catch (error) {
                console.error("資料讀取失敗", error);
            }
        }

        init();
    </script>
</body>
</html>
